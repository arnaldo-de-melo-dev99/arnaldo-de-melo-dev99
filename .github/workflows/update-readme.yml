name: Update README

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/update-readme.mjs'
      - '.github/workflows/update-readme.yml'
      - 'SETUP.md'

concurrency:
  group: update-readme
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh README content
        env:
          GITHUB_USERNAME: arnaldo-de-melo-dev99
          PROFILE_REPO_NAME: arnaldo-de-melo-dev99
          README_PATH: README.md
          PROJECT_LIMIT: '5'
          README_GITHUB_TOKEN: ${{ secrets.README_GITHUB_TOKEN }}
        run: node scripts/update-readme.mjs

      - name: Commit updated README
        run: |
          if git diff --quiet -- README.md; then
            echo "README is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): refresh real-time profile data"
          git push

    <animateTransform attributeName="transform" type="translate" values="0 18;0 0" dur="0.8s" begin="0.48s" fill="freeze" />
    <rect x="1148" y="34" width="268" height="90" rx="18" fill="#0B1120" stroke="#1F2937" stroke-width="1.4" />
    <rect x="1164" y="52" width="118" height="8" rx="4" fill="#3B82F6" fill-opacity="0.85" />
    <rect x="1164" y="74" width="168" height="7" rx="3.5" fill="#93C5FD" fill-opacity="0.22" />
    <rect x="1164" y="90" width="134" height="7" rx="3.5" fill="#93C5FD" fill-opacity="0.18" />

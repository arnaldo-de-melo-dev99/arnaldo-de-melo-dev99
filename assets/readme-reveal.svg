    <circle cx="1450" cy="126" r="2.2">
      <animate attributeName="cy" values="126;118;126" dur="4.9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.24;1;0.24" dur="4.9s" repeatCount="indefinite" />

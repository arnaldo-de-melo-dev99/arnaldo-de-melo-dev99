    <rect x="804" y="34" width="268" height="90" rx="18" fill="#0B1120" stroke="#1F2937" stroke-width="1.4" />
    <rect x="820" y="52" width="92" height="8" rx="4" fill="#3B82F6" fill-opacity="0.85" />
    <rect x="820" y="74" width="182" height="7" rx="3.5" fill="#93C5FD" fill-opacity="0.22" />
    <rect x="820" y="90" width="138" height="7" rx="3.5" fill="#93C5FD" fill-opacity="0.18" />
  </g>

  <g opacity="0">
